<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>国粮智卫</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body class="login-locked">
    <section id="loginScreen" class="login-screen" aria-labelledby="loginTitle">
      <div class="login-header">
        <div class="login-brand">
          <div class="brand-mark"><span></span></div>
          <div>
            <div class="brand-name">国粮智卫</div>
            <div class="brand-subtitle">Grain Intelligent Guard</div>
          </div>
        </div>
        <div class="login-system-status"><span class="status-dot"></span><span id="loginBackendStatus">正在检测后端...</span></div>
      </div>

      <div class="login-stage">
        <form id="loginForm" class="login-panel" novalidate>
          <div class="login-eyebrow"></div>
          <h1 id="loginTitle">欢迎使用国粮智卫</h1>
          <p class="login-description">请输入系统账号与密码进入管控平台</p>

          <label class="login-field">
            <span>账号</span>
            <input id="loginAccount" name="account" type="text" autocomplete="username" placeholder="请输入账号" />
          </label>
          <label class="login-field">
            <span>密码</span>
            <input id="loginPassword" name="password" type="password" autocomplete="current-password" placeholder="请输入密码" />
          </label>

          <p id="loginError" class="login-error" aria-live="polite"></p>
          <button class="login-submit" type="submit">登录系统</button>
          <div class="login-demo-account"></div>
        </form>
      </div>

      <div class="login-footer">智慧粮仓 · 安全生产 · 数字孪生</div>
    </section>

    <div id="app" class="app" aria-hidden="true">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark"><span></span></div>
          <div>
            <div class="brand-name">国粮智卫</div>
            <div class="brand-subtitle">Grain Intelligent Guard</div>
          </div>
        </div>
        <div class="screen-title" id="screenTitle">粮仓深钻除板结机器人智能管控平台</div>
        <div class="system-strip">
          <span class="status-dot"></span>
          <span id="backendStatus">正在检测后端...</span>
          <span>管理员</span>
          <strong id="clock">09:42:36</strong>
          <small id="dateText">2024-05-20 星期一</small>
        </div>
      </header>
      <nav class="nav" aria-label="主导航">
        <button class="nav-button is-active" data-page="dashboard">主界面</button>
        <button class="nav-button" data-page="operations">粮仓作业管理</button>
        <button class="nav-button" data-page="control">作业监控与控制</button>
        <button class="nav-button" data-page="monitor">粮情监测与预警</button>
        <button class="nav-button" data-page="analysis">数据分析与决策</button>
      </nav>

      <main>
        <section class="page page-dashboard is-active" data-view="dashboard"></section>
        <section class="page page-operations" data-view="operations"></section>
        <section class="page page-control" data-view="control"></section>
        <section class="page page-monitor" data-view="monitor"></section>
        <section class="page page-analysis" data-view="analysis"></section>
      </main>
    </div>

    <div id="modal" class="modal" aria-hidden="true">
      <div class="modal-card">
        <button class="modal-close" type="button" aria-label="关闭">×</button>
        <div id="modalContent"></div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
